<!DOCTYPE html>
<html lang="ko" class="bg-gray-50 dark:bg-gray-900 transition-colors duration-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 매뉴얼 - 물류팀 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        /* 에디터 스타일 조정 */
        .ql-container { font-family: 'Noto Sans KR', sans-serif; font-size: 14px; min-height: 400px; border-bottom-left-radius: 0.5rem; border-bottom-right-radius: 0.5rem; background-color: #fff; }
        .dark .ql-container { background-color: #1f2937; color: #e5e7eb; border-color: #374151; }
        .ql-toolbar { border-top-left-radius: 0.5rem; border-top-right-radius: 0.5rem; background-color: #f9fafb; }
        .dark .ql-toolbar { background-color: #374151; border-color: #4b5563; }
        .dark .ql-stroke { stroke: #d1d5db; }
        .dark .ql-fill { fill: #d1d5db; }
        .dark .ql-picker { color: #d1d5db; }
        .ql-editor img { max-width: 100%; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-200 overflow-hidden flex h-screen">

    <aside class="w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col z-20 shadow-sm shrink-0 transition-colors h-full relative">
        <div class="p-5 border-b border-gray-100 dark:border-gray-700 flex flex-col gap-4 shrink-0">
            <div class="flex items-center justify-between">
                <h1 class="text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2"><span>📚</span> 업무 매뉴얼</h1>
                <a href="index.html" class="text-xs text-gray-500 hover:text-gray-800 dark:hover:text-white bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded transition">메인으로</a>
            </div>
            <button id="btn-new-manual" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition shadow-sm text-sm hidden">
                + 새 매뉴얼 등록
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-3 custom-scrollbar" id="manual-list-container">
            <div class="flex justify-center items-center h-full text-gray-400 text-sm">목록을 불러오는 중...</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-gray-50 dark:bg-gray-900 relative">
        <div id="manual-view-area" class="flex-1 overflow-y-auto p-6 md:p-10 flex justify-center items-start custom-scrollbar">
            <div class="w-full max-w-4xl bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 min-h-[500px] flex flex-col">
                <div id="viewer-empty" class="flex-1 flex flex-col justify-center items-center text-gray-400 h-full p-20">
                    <span class="text-5xl mb-4">📖</span>
                    <p>좌측에서 매뉴얼을 선택하거나 새 매뉴얼을 등록해주세요.</p>
                </div>

                <div id="viewer-content" class="hidden flex-col h-full">
                    <div class="p-8 border-b border-gray-100 dark:border-gray-700 flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2 mb-2">
                                <span id="view-type-badge" class="px-2 py-0.5 text-[10px] font-bold rounded bg-blue-100 text-blue-800">분류</span>
                                <span id="view-date" class="text-xs text-gray-400 font-mono">2024-05-10</span>
                            </div>
                            <h2 id="view-title" class="text-2xl font-extrabold text-gray-900 dark:text-white">제목</h2>
                        </div>
                        <div class="flex gap-2">
                            <button id="btn-edit-manual" class="text-xs px-3 py-1.5 border border-gray-300 rounded text-gray-600 hover:bg-gray-50 dark:border-gray-600 dark:text-gray-300 hidden">수정</button>
                            <button id="btn-delete-manual" class="text-xs px-3 py-1.5 border border-red-200 rounded text-red-600 hover:bg-red-50 hidden">삭제</button>
                        </div>
                    </div>
                    
                    <div class="p-8 flex-1">
                        <div id="view-body" class="prose dark:prose-invert max-w-none"></div>
                        <div id="view-attachment" class="mt-8 pt-6 border-t border-gray-100 dark:border-gray-700 hidden">
                            <h4 class="text-xs font-bold text-gray-500 mb-3 uppercase tracking-wider">📎 첨부 파일 (PDF / Excel)</h4>
                            <a id="view-file-link" href="#" target="_blank" class="inline-flex items-center gap-2 px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 hover:border-indigo-400 transition group">
                                <span class="text-2xl">📄</span>
                                <div class="flex flex-col">
                                    <span id="view-file-name" class="text-sm font-bold text-gray-800 dark:text-gray-200 group-hover:text-indigo-600 transition">파일명.pdf</span>
                                    <span class="text-[10px] text-gray-400">클릭하여 열기 또는 다운로드</span>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="manual-edit-area" class="flex-1 overflow-y-auto p-6 md:p-10 flex justify-center items-start custom-scrollbar hidden absolute inset-0 bg-gray-50 dark:bg-gray-900 z-10">
            <div class="w-full max-w-4xl bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700 flex flex-col">
                <div class="p-6 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800 rounded-t-2xl">
                    <h2 class="text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2">✍️ 매뉴얼 작성 및 수정</h2>
                    <div class="flex gap-2">
                        <button id="btn-cancel-edit" class="text-sm px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-100">취소</button>
                        <button id="btn-save-manual" class="text-sm px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition shadow-sm">저장하기</button>
                    </div>
                </div>
                
                <div class="p-6 md:p-8 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div class="md:col-span-3">
                            <label class="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">제목</label>
                            <input type="text" id="edit-title" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-900 text-sm font-bold dark:text-white outline-none focus:border-blue-500" placeholder="매뉴얼 제목을 입력하세요">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">분류</label>
                            <select id="edit-category" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-900 text-sm font-bold dark:text-white outline-none focus:border-blue-500">
                                <option value="일반">일반 지침</option>
                                <option value="업무프로세스">업무 프로세스</option>
                                <option value="시스템사용법">시스템 사용법</option>
                                <option value="규정/내규">규정 / 내규</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">
                            본문 내용 <span class="font-normal text-gray-400 ml-2">(이미지는 복사해서 붙여넣거나 드래그 앤 드롭 하세요)</span>
                        </label>
                        <div id="quill-editor" class="bg-white"></div>
                    </div>

                    <div class="border-t border-gray-200 dark:border-gray-700 pt-6 mt-6">
                        <label class="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-2">📁 문서 파일 별도 첨부 (선택사항, PDF 또는 엑셀)</label>
                        <div class="flex items-center gap-3">
                            <input type="file" id="edit-file-upload" accept=".pdf, .xlsx, .xls" class="hidden">
                            <button id="btn-trigger-upload" class="px-4 py-2 border border-indigo-200 bg-indigo-50 text-indigo-700 text-sm font-bold rounded-lg hover:bg-indigo-100 transition shadow-sm">
                                파일 선택
                            </button>
                            <span id="upload-file-name" class="text-sm text-gray-500">선택된 파일 없음</span>
                        </div>
                        <p class="text-[10px] text-gray-400 mt-2">※ 파일 첨부 시 본문보다 파일이 우선적으로 표시됩니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/manual.js"></script>
</body>
</html>
