<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물류팀 업무현황</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 추가적인 UI 디테일 스타일링 */
        body { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; }
        .sidebar-menu-btn {
            @apply w-full text-left flex items-center gap-3 px-4 py-3 text-sm text-gray-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors duration-200;
        }
        .dashboard-card-modern {
            @apply bg-white rounded-2xl shadow-sm border border-slate-100 p-6;
        }
        /* 스크롤바 숨기기 (사이드바용) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex h-screen overflow-hidden">
    <div id="toast-container" class="fixed bottom-5 right-5 z-[200] space-y-2 w-full max-w-xs"></div>

    <aside class="w-64 bg-slate-900 text-white hidden md:flex flex-col h-full flex-shrink-0 shadow-xl z-20">
        <div class="h-20 flex items-center justify-center border-b border-slate-800 px-6">
            <h1 class="text-xl font-bold tracking-wide flex items-center gap-2">
                <span class="text-indigo-400">📦</span> 물류팀 현황판
            </h1>
        </div>
        
        <div class="flex-1 overflow-y-auto no-scrollbar p-4 flex flex-col gap-1">
            <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 mt-4 px-2">메인 메뉴</div>
            <button id="open-weekend-modal-btn" class="sidebar-menu-btn"><span>🗓️</span> <span class="font-medium">주말 근무 신청</span></button>
            <button id="open-my-leave-btn" class="sidebar-menu-btn"><span>🏖️</span> <span class="font-medium">내 연차관리</span></button>
            <button id="open-quantity-modal-today" class="sidebar-menu-btn"><span>📊</span> <span class="font-medium">오늘 처리량 입력</span></button>
            <button id="open-cost-simulation-btn" class="sidebar-menu-btn"><span>💰</span> <span class="font-medium">운영 시뮬레이션</span></button>
            
            <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 mt-6 px-2">관리 및 설정</div>
            <button id="open-history-btn" class="sidebar-menu-btn" style="display: none;"><span>📜</span> <span class="font-medium">데이터 관리</span></button>
            <button id="open-admin-todo-btn" class="sidebar-menu-btn" style="display: none;"><span>📝</span> <span class="font-medium">관리자 메모/할일</span></button>
            <a href="location.html" id="location-link-btn" target="location_window" class="sidebar-menu-btn"><span>📍</span> <span class="font-medium">로케이션 관리</span></a>
            <a href="admin.html" id="admin-link-btn" target="admin_window" class="sidebar-menu-btn" style="display: none;"><span>⚙️</span> <span class="font-medium">관리자 페이지</span></a>
            <button id="reset-app-btn" class="sidebar-menu-btn" style="display: none;"><span>🔄</span> <span class="font-medium">오늘 데이터 초기화</span></button>
            
            <div class="mt-auto pt-6 border-t border-slate-800">
                <button id="end-shift-btn" class="sidebar-menu-btn text-rose-300 hover:text-white hover:bg-rose-900/50"><span>🏁</span> <span class="font-medium">업무 마감</span></button>
                <button id="logout-btn" class="hidden sidebar-menu-btn text-rose-400 hover:bg-rose-900/50 mt-1"><span>🚪</span> <span class="font-semibold">로그아웃</span></button>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden">
        
        <header class="h-20 bg-white shadow-sm border-b border-slate-200 px-6 flex items-center justify-between flex-shrink-0 z-10">
            <div class="flex items-center gap-4">
                <button id="hamburger-btn" class="md:hidden p-2 rounded-md text-slate-500 hover:bg-slate-100 focus:outline-none">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <h1 class="text-2xl font-bold text-slate-800 md:hidden">물류팀 업무현황</h1>
                <div id="current-date-display" class="text-lg font-semibold text-slate-600 hidden md:block"></div>
            </div>

            <div id="top-right-controls" class="flex items-center gap-6 hidden">
                <div id="connection-indicator" class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200 shadow-inner">
                    <span id="user-greeting" class="text-sm font-semibold text-slate-700 mr-1 hidden"></span>
                    <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-400"></span>
                    <span id="connection-status" class="text-xs font-medium text-slate-500"></span>
                </div>
                
                <div class="hidden md:flex items-center gap-3">
                    <div id="personal-attendance-toggle-pc" class="hidden items-center gap-3 bg-indigo-50 border border-indigo-100 px-4 py-2 rounded-xl">
                        <span class="text-sm font-bold text-indigo-900" id="pc-attendance-label">내 출퇴근</span>
                        <label class="attendance-toggle cursor-pointer">
                            <input type="checkbox" id="pc-attendance-checkbox" class="sr-only peer">
                            <span class="attendance-toggle-text text-in">출근</span>
                            <span class="attendance-toggle-text text-out">퇴근</span>
                            <span class="attendance-toggle-knob shadow-sm"></span>
                        </label>
                        <button id="pc-clock-out-cancel-btn" class="hidden text-xs bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold px-3 py-1.5 rounded-md transition animate-pulse">
                            퇴근 취소
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div id="nav-content" class="hidden absolute top-20 left-0 right-0 bg-white shadow-xl z-40 p-4 border-b border-slate-200 md:hidden flex-col gap-4">
            <div class="flex flex-col items-start gap-2">
                 <div id="personal-attendance-toggle-mobile" class="flex justify-between items-center w-full p-4 bg-indigo-50 rounded-xl border border-indigo-100 hidden">
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-indigo-900 flex items-center gap-2">내 출퇴근</span>
                        <button id="mobile-clock-out-cancel-btn" class="hidden text-xs bg-yellow-400 text-yellow-900 px-2 py-1 rounded-md font-bold">취소</button>
                    </div>
                    <label class="attendance-toggle">
                        <input type="checkbox" id="mobile-attendance-checkbox" class="sr-only peer">
                        <span class="attendance-toggle-text text-in">출근</span>
                        <span class="attendance-toggle-text text-out">퇴근</span>
                        <span class="attendance-toggle-knob"></span>
                    </label>
                </div>
                
                <button id="open-weekend-modal-btn-mobile" class="w-full flex items-center gap-2 bg-slate-50 text-slate-700 font-semibold text-sm py-3 px-4 rounded-xl border border-slate-200">🗓️ 주말 근무 현황</button>
                <button id="open-my-leave-btn-mobile" class="w-full flex items-center gap-2 bg-slate-50 text-slate-700 font-semibold text-sm py-3 px-4 rounded-xl border border-slate-200">🏖️ 내 연차관리</button>
                <button id="open-quantity-modal-today-mobile" class="w-full flex items-center gap-2 bg-indigo-50 text-indigo-700 font-bold text-sm py-3 px-4 rounded-xl border border-indigo-200">📊 오늘 처리량 입력</button>
                <button id="open-cost-simulation-btn-mobile" class="w-full flex items-center gap-2 bg-slate-50 text-slate-700 font-semibold text-sm py-3 px-4 rounded-xl border border-slate-200">💰 운영 시뮬레이션</button>
                
                <button id="open-history-btn-mobile" class="w-full flex items-center gap-2 bg-slate-100 text-slate-800 font-semibold text-sm py-3 px-4 rounded-xl" style="display: none;">📜 데이터 관리</button>
                <button id="open-admin-todo-btn-mobile" class="w-full flex items-center gap-2 bg-slate-100 text-slate-800 font-semibold text-sm py-3 px-4 rounded-xl" style="display: none;">📝 관리자 메모</button>
                <a href="location.html" id="location-link-btn-mobile" target="location_window" class="w-full flex items-center gap-2 bg-teal-50 text-teal-700 font-semibold text-sm py-3 px-4 rounded-xl border border-teal-200">📍 로케이션 관리</a>
                <a href="admin.html" id="admin-link-btn-mobile" target="admin_window" class="w-full flex items-center gap-2 bg-slate-800 text-white font-semibold text-sm py-3 px-4 rounded-xl" style="display: none;">⚙️ 관리자 페이지</a>
                
                <button id="end-shift-btn-mobile" class="w-full flex items-center gap-2 bg-rose-50 text-rose-700 font-bold text-sm py-3 px-4 rounded-xl border border-rose-200 mt-2">🏁 업무 마감</button>
                <button id="reset-app-btn-mobile" class="w-full flex items-center gap-2 bg-slate-200 text-slate-800 font-semibold text-sm py-3 px-4 rounded-xl" style="display: none;">🔄 초기화</button>
                <button id="logout-btn-mobile" class="hidden w-full flex items-center justify-center gap-1 bg-rose-500 text-white font-bold text-sm py-3 px-4 rounded-xl mt-2">🚪 로그아웃</button>
            </div>
        </div>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 md:space-y-8 bg-slate-50/50">
            
            <div class="dashboard-card-modern hidden" id="summary-section">
                <div id="toggle-summary" class="flex justify-between items-center cursor-pointer md:cursor-auto mb-6">
                    <h2 class="text-xl font-extrabold text-slate-800">📊 업무 현황 및 목표량</h2>
                    <svg id="summary-arrow" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:hidden transition-transform transform text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>
                <div id="summary-content" class="hidden md:grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-4 text-center">
                    </div>
            </div>

            <div id="main-content-area" class="dashboard-card-modern flex-grow flex flex-col hidden shadow-md border-indigo-50">
                <h2 class="text-xl font-extrabold text-slate-800 mb-6 flex items-center gap-2">
                    <span class="w-2 h-6 bg-indigo-500 rounded-full inline-block"></span> 실시간 업무 보드
                </h2>
                <div id="loading-spinner" class="text-center py-16">
                    <div class="animate-spin rounded-full h-14 w-14 border-t-2 border-b-2 border-indigo-600 mx-auto"></div>
                    <p class="mt-6 text-slate-500 font-medium">데이터를 동기화 중입니다...</p>
                </div>
                <div id="team-status-board" class="space-y-8 flex-grow">
                    </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 md:gap-8">
                
                <div class="dashboard-card-modern hidden" id="analysis-section">
                    <div id="toggle-analysis" class="flex justify-between items-center cursor-pointer md:cursor-auto mb-6">
                        <h2 class="text-xl font-extrabold text-slate-800">📈 오늘의 업무 분석</h2>
                         <svg id="analysis-arrow" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:hidden transition-transform transform text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                    <div id="analysis-content" class="hidden md:block">
                        <div class="mb-5 border-b border-slate-200">
                            <nav id="analysis-tabs" class="flex space-x-6" aria-label="Tabs">
                                <button type="button" data-tab-panel="analysis-task-summary-panel" class="analysis-tab-btn whitespace-nowrap pb-3 px-1 border-b-2 font-bold text-sm text-indigo-600 border-indigo-600">팀 전체 요약</button>
                                <button type="button" data-tab-panel="analysis-personal-stats-panel" class="analysis-tab-btn whitespace-nowrap pb-3 px-1 border-b-2 font-medium text-sm text-slate-500 border-transparent hover:text-slate-800 hover:border-slate-300">개인별 통계</button>
                            </nav>
                        </div>
                        <div id="analysis-panels" class="min-h-[250px]">
                            <div id="analysis-task-summary-panel" class="analysis-tab-panel"></div>
                            <div id="analysis-personal-stats-panel" class="analysis-tab-panel hidden">
                                <div class="max-w-md mb-4">
                                    <select id="analysis-member-select" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm font-medium">
                                        <option value="">--- 분석할 직원/알바 선택 ---</option>
                                    </select>
                                </div>
                                <div id="analysis-personal-stats-container" class="mt-4 p-5 bg-slate-50 rounded-xl border border-slate-100 min-h-[150px]">
                                    <p class="text-center text-slate-500 py-6">직원을 선택하시면 개인 통계가 표시됩니다.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="dashboard-card-modern hidden flex-col h-full" id="completed-log-section">
                    <div id="toggle-completed-log" class="flex justify-between items-center cursor-pointer md:cursor-auto mb-6">
                        <h2 class="text-xl font-extrabold text-slate-800">✅ 오늘 완료된 업무</h2>
                        <svg id="completed-log-arrow" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:hidden transition-transform transform text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                    <div id="completed-log-content" class="hidden md:flex flex-col flex-1">
                        <div class="flex flex-wrap gap-2 justify-end items-center mb-4">
                            <button id="save-progress-btn" class="bg-teal-500 hover:bg-teal-600 text-white font-bold py-2.5 px-5 rounded-xl transition shadow-md shadow-teal-200 text-sm">진행률 중간 저장</button>
                        </div>
                        <div class="overflow-auto relative bg-white rounded-xl border border-slate-200 flex-1 max-h-[400px]">
                            <table class="w-full text-sm text-left text-slate-600">
                                <thead class="text-xs text-slate-500 uppercase bg-slate-50 sticky top-0 z-10 border-b border-slate-200">
                                    <tr>
                                        <th scope="col" class="px-5 py-4 font-bold">이름</th>
                                        <th scope="col" class="px-5 py-4 font-bold">업무</th>
                                        <th scope="col" class="px-5 py-4 font-bold">시작</th>
                                        <th scope="col" class="px-5 py-4 font-bold">종료</th>
                                        <th scope="col" class="px-5 py-4 font-bold">소요</th>
                                        <th scope="col" class="px-5 py-4 text-right">
                                            <button id="open-manual-add-btn" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 mr-3 px-2 py-1 bg-indigo-50 rounded">수동추가</button>
                                            <button id="delete-all-completed-btn" class="text-xs font-bold text-rose-500 hover:text-rose-700 px-2 py-1 bg-rose-50 rounded">일괄삭제</button>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody id="work-log-body" class="divide-y divide-slate-100"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
    
    <div id="modals-container-auth"></div>
    <div id="modals-container-simulation"></div>
    <div id="modals-container-confirm"></div>
    <div id="modals-container-history"></div>
    <div id="modals-container-form"></div>
    <div id="modals-container-admin-todo"></div>
    <div id="modals-container-admin-todo-alert"></div>
    <div id="modals-container-weekend"></div>

    <script>
        // 자바스크립트는 구조 변경 시 에러가 나지 않도록 hidden 클래스 등을 제어하기 위해 약간의 수정을 더했습니다.
        document.addEventListener('DOMContentLoaded', () => {
            // UI 섹션 강제 표시 (JS 로드 전이라도 공간 확보)
            const sections = ['summary-section', 'analysis-section', 'completed-log-section'];
            sections.forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.classList.remove('hidden');
                    el.classList.add('flex');
                }
            });
        });

        // 1. 외부 HTML 컴포넌트 로더
        async function loadComponent(url, containerId) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const html = await response.text();
                document.getElementById(containerId).innerHTML = html;
            } catch (error) {
                console.error("컴포넌트 로딩 실패:", error);
                const toast = document.createElement('div');
                toast.className = 'toast show bg-red-500 p-3 rounded-lg shadow-xl text-white';
                toast.textContent = `필수 구성 요소(${url})를 불러오지 못했습니다. 새로고침 해주세요.`;
                document.getElementById('toast-container').prepend(toast);
            }
        }

        // 2. 앱 시작
        async function initApp() {
            await Promise.all([
                loadComponent('components/modals-auth.html', 'modals-container-auth'),
                loadComponent('components/modals-simulation.html', 'modals-container-simulation'),
                loadComponent('components/modals-confirm.html', 'modals-container-confirm'),
                loadComponent('components/modals-history.html', 'modals-container-history'),
                loadComponent('components/modals-form.html', 'modals-container-form'),
                loadComponent('components/modals-admin-todo.html', 'modals-container-admin-todo'),
                loadComponent('components/modals-admin-todo-alert.html', 'modals-container-admin-todo-alert'),
                loadComponent('components/modals-weekend.html', 'modals-container-weekend')
            ]);

            try {
                await import('./js/app.js');
            } catch (e) {
                console.error("메인 앱 스크립트 로딩 실패:", e);
            }
        }

        initApp();
    </script>
</body>
</html>
