<div id="weekend-work-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50 flex items-center justify-center">
    <div class="relative bg-white rounded-lg shadow-xl w-full max-w-2xl p-4 md:p-6 mx-auto my-4 flex flex-col max-h-[90vh]">
        
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl md:text-2xl font-bold text-gray-800 flex items-center gap-2">
                🗓️ 주말 근무 신청
            </h3>
            <button id="close-weekend-modal-btn" class="text-gray-400 hover:text-gray-700 text-3xl font-bold">&times;</button>
        </div>
        
        <div id="weekend-stats-container" class="mb-4 bg-indigo-50 p-3 rounded-lg border border-indigo-100 hidden">
            <h4 class="text-sm font-bold text-indigo-800 mb-2 flex items-center gap-1">📊 이달의 신청 현황 (승인/대기)</h4>
            <div id="weekend-stats-list" class="flex flex-wrap gap-2 text-xs">
                </div>
        </div>

        <div class="flex justify-center items-center space-x-6 mb-6 bg-gray-50 p-3 rounded-lg">
            <button id="prev-month-btn" class="p-2 rounded-full hover:bg-gray-200 text-gray-600 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h2 id="current-month-label" class="text-xl md:text-2xl font-bold text-gray-800 w-40 md:w-48 text-center">Loading...</h2>
            <button id="next-month-btn" class="p-2 rounded-full hover:bg-gray-200 text-gray-600 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>

        <div class="flex justify-end space-x-4 mb-2 text-xs md:text-sm font-medium">
            <div class="flex items-center"><span class="w-3 h-3 bg-orange-400 rounded-full mr-2"></span>승인 대기</div>
            <div class="flex items-center"><span class="w-3 h-3 bg-blue-600 rounded-full mr-2"></span>확정됨</div>
        </div>

        <div class="flex-grow overflow-y-auto border-t border-gray-200 mt-2">
            <div id="weekend-list-view" class="space-y-3 py-2"></div>
        </div>
    </div>
</div>

<div id="weekend-admin-popup" class="fixed inset-0 bg-black bg-opacity-40 hidden z-[60] flex items-center justify-center px-4">
    <div class="bg-white p-6 rounded-lg shadow-2xl w-full max-w-sm">
        <h4 class="text-lg font-bold mb-4 text-gray-800">신청 관리</h4>
        <div class="mb-6 space-y-2">
            <p class="text-gray-600"><span class="font-bold text-gray-900" id="admin-popup-member"></span>님의 신청</p>
            <p class="text-gray-500 text-xs mt-2">현재 상태: <span id="admin-popup-status" class="font-bold"></span></p>
        </div>
        
        <div class="flex justify-end space-x-2">
            <button id="admin-reject-btn" class="px-4 py-2 bg-red-100 text-red-700 rounded hover:bg-red-200 font-medium text-sm">반려(삭제)</button>
            <button id="admin-confirm-btn" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 font-medium text-sm">승인 확정</button>
        </div>
        <button id="admin-close-popup-btn" class="mt-4 w-full text-center text-sm text-gray-400 hover:text-gray-600">닫기</button>
    </div>
</div>

<div id="weekend-admin-date-popup" class="fixed inset-0 bg-black bg-opacity-40 hidden z-[70] flex items-center justify-center px-4">
    <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h4 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                ⚙️ <span id="admin-date-popup-title">날짜</span> 관리
            </h4>
            <button id="admin-date-close-btn" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
        </div>
        
        <div class="space-y-5">
            <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                <label class="block text-sm font-bold text-blue-800 mb-2">👤 수동 인원 추가 (즉시 확정)</label>
                <div class="flex gap-2">
                    <input type="text" id="admin-date-add-member" class="flex-1 p-2 border border-blue-300 rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="이름 입력">
                    <button id="admin-date-add-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-bold transition shadow-sm">추가</button>
                </div>
            </div>

            <div class="bg-purple-50 p-4 rounded-lg border border-purple-100">
                <label class="block text-sm font-bold text-purple-800 mb-2">🎲 랜덤 인원 뽑기 (승인 대기 등록)</label>
                <div class="flex gap-2 items-center">
                    <input type="number" id="admin-date-random-count" min="1" max="10" value="1" class="w-16 p-2 border border-purple-300 rounded focus:ring-2 focus:ring-purple-500 outline-none text-center">
                    <span class="text-sm text-purple-700 font-medium">명</span>
                    <button id="admin-date-random-btn" class="ml-auto bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded font-bold transition shadow-sm">추첨하기</button>
                </div>
                <p class="text-xs text-purple-600 mt-2">* 관리자 제외 및 기신청자 제외 후 뽑습니다.</p>
            </div>

            <div class="bg-red-50 p-4 rounded-lg border border-red-100 flex justify-between items-center">
                <div>
                    <span class="block text-sm font-bold text-red-800">🚫 이 날짜 신청 마감</span>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="admin-date-block-toggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-600"></div>
                </label>
            </div>
        </div>
    </div>
</div>
