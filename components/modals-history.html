<div id="history-modal" class="fixed inset-0 bg-gray-900/75 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4 transition-colors">
    <div id="history-modal-content-box" class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl w-[1400px] h-[880px] flex flex-col relative overflow-hidden transition-colors border border-gray-200 dark:border-gray-700">

        <div id="history-modal-header" class="p-5 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center cursor-move bg-white dark:bg-gray-800 rounded-t-2xl shrink-0 transition-colors">
            <h2 class="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
                <span>📜</span> 데이터 관리
            </h2>
            <div class="flex items-center gap-3">
                <button id="toggle-history-fullscreen-btn" class="p-1.5 text-gray-400 hover:text-gray-700 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition" title="전체화면">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" /></svg>
                </button>
                <button id="close-history-btn" class="p-1.5 text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition" title="닫기">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
        </div>

        <div class="px-6 border-b border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50 flex flex-wrap justify-between items-end gap-4 pt-2 shrink-0 transition-colors">
            <div id="history-main-tabs" class="flex gap-4 -mb-px overflow-x-auto no-scrollbar">
                <button data-main-tab="work" class="history-main-tab-btn py-4 font-bold text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 dark:border-blue-400 transition whitespace-nowrap">업무 이력</button>
                <button data-main-tab="attendance" class="history-main-tab-btn py-4 font-medium text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 border-b-2 border-transparent transition whitespace-nowrap">근태 이력</button>
                <button data-main-tab="trends" class="history-main-tab-btn py-4 font-medium text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 border-b-2 border-transparent transition whitespace-nowrap">📈 트렌드 분석</button>
                <button data-main-tab="prediction" class="history-main-tab-btn py-4 font-medium text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 border-b-2 border-transparent transition whitespace-nowrap">🔮 실적 예측</button>
                <button data-main-tab="report" class="history-main-tab-btn py-4 font-medium text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 border-b-2 border-transparent transition whitespace-nowrap">📊 업무 리포트</button>
                <button data-main-tab="personal" class="history-main-tab-btn py-4 font-medium text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 border-b-2 border-transparent transition whitespace-nowrap">👤 개인 리포트</button>
                <button data-main-tab="management" class="history-main-tab-btn py-4 font-medium text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 border-b-2 border-transparent transition whitespace-nowrap">💼 경영 지표</button>
                <button data-main-tab="inspection" class="history-main-tab-btn py-4 font-medium text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 border-b-2 border-transparent transition whitespace-nowrap">📦 검수 이력</button>
                <button data-main-tab="leave" class="history-main-tab-btn py-4 font-medium text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 border-b-2 border-transparent transition whitespace-nowrap">🏖️ 연차 관리</button>
                <button data-main-tab="weekend" class="history-main-tab-btn py-4 font-medium text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 border-b-2 border-transparent transition whitespace-nowrap">📅 주말 통계</button>
            </div>

            <div id="history-date-range-controls" class="flex items-center gap-3 pb-3">
                <div class="flex items-center gap-2 bg-white dark:bg-gray-800 px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700 shadow-sm transition-colors">
                    <label for="history-start-date" class="text-xs font-bold text-gray-600 dark:text-gray-300">기간:</label>
                    <input type="date" id="history-start-date" class="p-1 bg-transparent border border-gray-300 dark:border-gray-600 rounded text-xs focus:ring-blue-500 focus:border-blue-500 h-7 text-gray-700 dark:text-white outline-none">
                    <span class="text-gray-400 dark:text-gray-500 text-xs">~</span>
                    <input type="date" id="history-end-date" class="p-1 bg-transparent border border-gray-300 dark:border-gray-600 rounded text-xs focus:ring-blue-500 focus:border-blue-500 h-7 text-gray-700 dark:text-white outline-none">
                    <div class="w-px h-4 bg-gray-300 dark:bg-gray-600 mx-1"></div>
                    <button id="history-filter-btn" class="text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 font-bold text-xs px-2 py-1 rounded transition">조회</button>
                    <button id="history-clear-filter-btn" class="text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 text-xs px-2 py-1 transition">초기화</button>
                </div>
                <button id="history-download-period-excel-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-1.5 px-3 rounded-lg text-xs shadow-sm flex items-center gap-1.5 transition h-[34px]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                    기간 엑셀
                </button>
            </div>
        </div>

        <div class="flex-grow flex overflow-hidden">
            <div id="history-date-list-container" class="w-[230px] border-r border-gray-200 dark:border-gray-800 overflow-y-auto bg-gray-50 dark:bg-gray-800/30 flex-shrink-0 transition-colors">
                <ul id="history-date-list" class="p-3 space-y-1"></ul>
            </div>
            
            <div id="history-panels-wrapper" class="flex-1 flex flex-col overflow-hidden min-w-0 bg-gray-100/80 dark:bg-gray-900 transition-colors">
            </div>
        </div>

        <div id="history-sub-modals-wrapper">
        </div>

    </div>
</div>
