<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>물류팀 데이터 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 모달 껍데기를 일반 페이지처럼 보이도록 CSS 조정 */
        body { background-color: #f9fafb; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        
        /* 모달 배경 지우고 꽉 차게 만들기 */
        #history-modal { position: static !important; display: flex !important; background: none !important; width: 100%; height: 100%; padding: 0 !important; }
        #history-modal-content-box { width: 100% !important; height: 100% !important; border-radius: 0 !important; box-shadow: none !important; }
        
        /* 전체화면/닫기 버튼 숨기기 (새 탭이니까 브라우저 탭 자체를 닫으면 됨) */
        #toggle-history-fullscreen-btn, #close-history-btn, #history-modal-header { display: none !important; }
    </style>
</head>
<body class="text-gray-800 font-['Inter']">
    <div id="toast-container" class="space-y-2 w-full max-w-xs"></div>

    <div id="modals-container-history" class="w-full h-full"></div>
    <div id="modals-container-download"></div>
    <div id="modals-container-confirm"></div>
    
    <script>
        // 공통 컴포넌트 로드 (모달 UI 파일들)
        async function loadComponent(url, containerId) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const html = await response.text();
                document.getElementById(containerId).innerHTML = html;
            } catch (error) {
                console.error("컴포넌트 로딩 실패:", error);
            }
        }

        async function initHistoryApp() {
            // 히스토리 모달 내용만 단독으로 불러옴
            await Promise.all([
                loadComponent('components/modals-history.html', 'modals-container-history'),
                loadComponent('components/modals-confirm.html', 'modals-container-confirm')
            ]);

            // 새 창 전용으로 최소한의 상태(로그인 등)와 리스너만 초기화
            try {
                const { appState } = await import('./js/state.js');
                const { checkAuthState } = await import('./js/app-logic.js');
                const { setupHistoryModalListeners } = await import('./js/listeners-history.js');
                const { loadAndRenderHistoryList } = await import('./js/app-history-logic.js');
                const { setupGeneralModalListeners } = await import('./js/listeners-modals.js');

                // 로그인 체크
                const user = await checkAuthState();
                if (!user) {
                    alert("로그인이 필요합니다. 메인 대시보드에서 로그인해주세요.");
                    window.close(); // 새 탭 닫기
                    return;
                }

                // 리스너 연결
                setupHistoryModalListeners();
                setupGeneralModalListeners();

                // 데이터 불러오기 및 그리기 시작!
                await loadAndRenderHistoryList();

            } catch (e) {
                console.error("데이터 관리 스크립트 로딩 실패:", e);
            }
        }

        initHistoryApp();
    </script>
</body>
</html>
